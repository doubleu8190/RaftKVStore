nodeId=A
mode=cluster
port=6666
connectorPort=6665
bossThreads=1
workerThreads=1
minElectionTimeout=3000
maxElectionTimeout=4000
logReplicationDelay=1000
logReplicationInterval=1000
retryTimeout=900
basePath=./data/A
snapshotGenerateThreshold=52428800
maxTransferLogs=30000
maxTransferSize=10485760
#buffPollSize
readIdleTimeout=0
writeIdleTimeout=0
allIdleTimeout=30
clusterInfo=A,127.0.0.1,6666,6665 B,127.0.0.1,7777,7776 C,127.0.0.1,8888,8887
blockFlushInterval=500
synLogFlush=false
#LOG CONFIG
#log4j.rootLogger=info, stdout, D, I, W, E
log4j.rootLogger=debug, stdout, D, I, W, E
log4j.appender.stdout=org.apache.log4j.ConsoleAppender
log4j.appender.stdout.layout=org.apache.log4j.PatternLayout
log4j.appender.stdout.layout.ConversionPattern=[%d{yyyy-MM-dd HH:mm:ss,SSS}] [%X{channel}] [%t] [%-5p] [%l]: %m%n
#debug
log4j.appender.D=cn.ttplatform.wh.log4j.DailyRollingFileAppenderWrapper
log4j.appender.D.File=./data/A/app.log
log4j.appender.D.Append=true
log4j.appender.D.Threshold=DEBUG
#log4j.appender.D.ImmediateFlush=false
#log4j.appender.D.BufferedIO=true
#log4j.appender.D.BufferSize=8192
log4j.appender.D.layout=org.apache.log4j.PatternLayout
log4j.appender.D.layout.ConversionPattern=[%d{yyyy-MM-dd HH:mm:ss,SSS}] [%X{channel}] [%t] [%-5p] [%l]: %m%n
#info
log4j.appender.I=cn.ttplatform.wh.log4j.DailyRollingFileAppenderWrapper
log4j.appender.I.File=./data/A/app.log
log4j.appender.I.Append=true
log4j.appender.I.Threshold=INFO
log4j.appender.I.layout=org.apache.log4j.PatternLayout
log4j.appender.I.layout.ConversionPattern=[%d{yyyy-MM-dd HH:mm:ss,SSS}] [%X{channel}] [%t] [%-5p] [%l]: %m%n
#warn
log4j.appender.W=cn.ttplatform.wh.log4j.DailyRollingFileAppenderWrapper
log4j.appender.W.File=./data/A/app.log
log4j.appender.W.Append=true
log4j.appender.W.Threshold=WARN
log4j.appender.W.layout=org.apache.log4j.PatternLayout
log4j.appender.W.layout.ConversionPattern=[%d{yyyy-MM-dd HH:mm:ss,SSS}] [%X{channel}] [%t] [%-5p] [%l]: %m%n
#error
log4j.appender.E=cn.ttplatform.wh.log4j.DailyRollingFileAppenderWrapper
log4j.appender.E.File=./data/A/app.log
log4j.appender.E.Append=true
log4j.appender.E.Threshold=ERROR
log4j.appender.E.layout=org.apache.log4j.PatternLayout
log4j.appender.E.layout.ConversionPattern=[%d{yyyy-MM-dd HH:mm:ss,SSS}] [%X{channel}] [%t] [%-5p] [%l]: %m%n
